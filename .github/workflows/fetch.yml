name: Fetch MIB EOD Data + Flows + Scores

permissions:
  contents: write

on:
  schedule:
    - cron: '18 17 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Fetch EOD prices
        run: python fetch_data.py

      - name: Fetch institutional flows
        run: python fetch_flows.py || true

      - name: Generate scores
        run: python score_generator.py || true

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "EOD scores $(date +%Y-%m-%d)" || true
          git push
