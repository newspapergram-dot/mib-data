name: Nightly Quant Multi-Agent Pipeline

permissions:
  contents: write

on:
  schedule:
    # 22:45 ora italiana cade a due offset UTC diversi a seconda dell'ora legale.
    # Si programmano ENTRAMBI i cron; il job "gate" lascia passare solo quello che,
    # all'esecuzione, corrisponde davvero alle ~22:45 a Roma — cosi' il workflow
    # resta corretto tutto l'anno senza dover ricordarsi di cambiare l'orario a marzo/ottobre.
    - cron: '45 21 * * *'   # 22:45 CET (UTC+1, ora solare)
    - cron: '45 20 * * *'   # 22:45 CEST (UTC+2, ora legale)
  workflow_dispatch:        # esecuzione manuale da tab Actions, sempre permessa

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verifica se il Comitato ha gia' prodotto un report oggi
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # PRECEDENTE APPROCCIO (controllo sull'ORA di Roma, finestra 22:30-23:20)
          # ABBANDONATO il 1/7/2026: i trigger schedulati su questo account/repo
          # hanno un ritardo sistemico documentato di 4-5 ORE (verificato su
          # fetch.yml: cron nominale 17:18 UTC, esecuzione reale sempre tra le
          # 21:47 e le 23:03 UTC, ogni giorno feriale per due settimane). Un
          # controllo sull'orario di esecuzione e' quindi inaffidabile per capire
          # se "e' davvero il momento giusto": il trigger delle 22:45 puo'
          # arrivare a notte fonda o il giorno dopo.
          #
          # Si controlla invece se il report di OGGI (data di Roma al momento
          # dell'esecuzione, qualunque essa sia) esiste gia': funziona a
          # prescindere da quanto sia in ritardo il trigger, e previene comunque
          # la doppia esecuzione dei due cron stagionali (CET/CEST) — quale dei
          # due arriva per secondo trova il report gia' scritto e si ferma.
          today=$(TZ=Europe/Rome date +%Y-%m-%d)
          if [ -f "data/COMMITTEE_REPORT_${today}.txt" ]; then
            echo "Report di oggi ($today) gia' presente: skip."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "Nessun report per oggi ($today): procedo."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  run-pipeline:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Safety tests (isolamento agenti, backstop, schema) — falliscono presto, senza costare token
        run: pytest tests/ -q

      - name: Fetch EOD prices
        run: python fetch_data.py
      - name: Classifica regime di mercato
        run: python regime_filter.py
      - name: Genera score tecnico/momentum
        run: python score_generator.py || true
      - name: Pattern candlestick/struttura (RSI divergence, breakout, Bollinger)
        run: python patterns.py || true
      - name: Screener unicorni — scoperta fondamentale (SEC EDGAR)
        run: python unicorn_screener.py || true
      - name: Sleeve unicorni — gate momentum top-quintile + crescita ricavi YoY>=25%
        run: python -c "import unicorn_validate; unicorn_validate.live_sleeve()" || true
      - name: Fondamentali USA (SEC EDGAR, point-in-time) — include gli unicorni che hanno passato il gate
        run: python fundamentals_pit.py || true
      - name: Fondamentali EU
        run: python fundamentals_eu.py || true
      - name: Nomi azienda per ticker (SEC entity + Yahoo, con cache) — mai a runtime nel report
        run: python company_names.py || true

      - name: Data Parser — assembla il JSON validato per il Comitato
        run: python build_committee_input.py

      - name: Esegui il Comitato Multi-Agente
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python orchestrator.py data/committee_input.json

      - name: Set up Node.js (dashboard Astro)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installa dipendenze frontend
        working-directory: frontend
        run: npm ci

      - name: Build dashboard Astro — controllo di non-regressione (il deploy lo fa
          Cloudflare Pages via la sua integrazione nativa con GitHub, non questo step)
        working-directory: frontend
        run: npm run build

      - name: Archivia il report della notte
        uses: actions/upload-artifact@v4
        with:
          name: committee-report-${{ github.run_id }}
          path: data/COMMITTEE_REPORT_*.txt
          retention-days: 30

      - name: Commit dati e report aggiornati
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add -A
          git commit -m "nightly: dati + report Comitato $(TZ=Europe/Rome date +%Y-%m-%d) [skip ci]" || true
          # Retry con rebase: un push nudo fallisce se main e' avanzato nel
          # frattempo (es. un altro commit manuale in parallelo — successo il
          # 1/7/2026: il Comitato aveva girato con successo ma il report e'
          # andato perso perche' il semplice `git push` e' stato rifiutato senza
          # nessun tentativo di recupero).
          for i in 1 2 3 4 5; do
            if git push; then
              break
            fi
            echo "push rifiutato (probabile race su main), riprovo con rebase (tentativo $i)..."
            git fetch origin main
            git rebase origin/main
            sleep 2
          done
